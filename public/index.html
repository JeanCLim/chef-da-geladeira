<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta charset="UTF-8" />
    <title>O Chef da Geladeira</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>O Chef da Geladeira</h1>
      <h2>Digite os ingredientes em inglês!</h2>
      <form id="form-busca" class="search-box">
        <input
          type="text"
          id="ingredientes"
          name="ingredientes"
          placeholder="Ex: tomato, egg, cheese"
          required
        />
        <button type="submit">Cozinhar!</button>
      </form>
      <div id="historico-buscas" class="historico-container"></div>

      <div id="resultados" class="cards-container"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
